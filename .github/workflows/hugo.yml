name: Deploy Hugo site to Pages

on:
  push:
    branches: ["master"]
permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # This enables Git history for lastmod
          submodules: recursive
          lfs: true

      - name: Setup Node.js (ensure Actions run on Node 24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build with Hugo
        run: hugo --minify -s consultancy-site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./consultancy-site/docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
